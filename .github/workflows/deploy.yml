name: Intellog CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ============ CI: Test & Validate ============
  test:
    name: Test & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate imports (smoke test)
        run: |
          python -c "from backend.main import app; print('✅ FastAPI app imports OK')"
          python -c "from backend.cloud import cloud_connector; print('✅ Cloud module imports OK')"
          python -c "from backend.filtering import filter_metrics, filter_network, filter_log; print('✅ Filtering imports OK')"
          python -c "from ai_model.classifier import classify_severity; print('✅ AI classifier imports OK')"
          python -c "from agent.monitor import IntellogAgent; print('✅ Agent imports OK')"

      - name: Check project structure
        run: |
          echo "📁 Verifying project structure..."
          test -f backend/main.py && echo "✅ backend/main.py"
          test -f backend/routes.py && echo "✅ backend/routes.py"
          test -f backend/cloud.py && echo "✅ backend/cloud.py"
          test -f backend/filtering.py && echo "✅ backend/filtering.py"
          test -f backend/auth.py && echo "✅ backend/auth.py"
          test -f agent/monitor.py && echo "✅ agent/monitor.py"
          test -f ai_model/classifier.py && echo "✅ ai_model/classifier.py"
          test -f frontend/index.html && echo "✅ frontend/index.html"
          test -f frontend/app.js && echo "✅ frontend/app.js"
          test -f frontend/styles.css && echo "✅ frontend/styles.css"
          test -f requirements.txt && echo "✅ requirements.txt"

      - name: Lint check (syntax errors)
        run: |
          python -m py_compile backend/main.py
          python -m py_compile backend/routes.py
          python -m py_compile backend/cloud.py
          python -m py_compile backend/cloud_routes.py
          python -m py_compile backend/filtering.py
          python -m py_compile backend/auth.py
          python -m py_compile backend/models.py
          python -m py_compile backend/schemas.py
          python -m py_compile agent/monitor.py
          python -m py_compile ai_model/classifier.py
          echo "✅ All Python files compile OK"

      - name: API endpoint test
        run: |
          # Start server in background
          python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          sleep 3

          # Test health endpoint
          curl -f http://localhost:8000/api/health || exit 1
          echo ""
          echo "✅ Health endpoint OK"

          # Test cloud scan endpoint
          curl -f http://localhost:8000/api/cloud/vms || exit 1
          echo ""
          echo "✅ Cloud VM scan OK"

          # Test cloud status endpoint
          curl -f http://localhost:8000/api/cloud/status || exit 1
          echo ""
          echo "✅ Cloud status OK"

          # Kill server
          kill %1 2>/dev/null || true

  # ============ CD: Notify Deploy ============
  deploy-notify:
    name: Deploy Notification
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy notification
        run: |
          echo "✅ CI passed. Code is ready for deployment."
          echo "📡 Your self-hosted server should auto-pull via deploy watcher."
          echo ""
          echo "If auto-deploy is not running, SSH to your server and run:"
          echo "  cd /path/to/INTELLOG && git pull && deploy.bat"
